<!DOCTYPE html>
<html lang="en">
<head>
  <!-- =======================================
       BASIC PAGE SETUP
  ======================================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICAS Bulletin Page</title>

  <!-- =======================================
       STYLESHEETS
       This page is inside /bulletins/
  ======================================== -->
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/typography.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/bulletins.css">
  <link rel="stylesheet" href="../css/navbar.css">
</head>

<body>
  <!-- =======================================
       SITE NAVIGATION
  ======================================== -->
  <div id="navigate"></div>

  <!-- =======================================
       MAIN PAGE CONTENT
  ======================================== -->
  <main id="main">
    <div class="content-container">
      <div id="icaslogo">
        <div class="logo">Institute for Corean-American Studies</div>
      </div>

      <header class="page-header">
        <h1 id="bulletinsPageTitle">Bulletins</h1>
        <hr class="title-line">
      </header>

      <section class="bulletin-feed-table" aria-labelledby="bulletins-heading">
        <h2 id="bulletins-heading" class="visually-hidden">ICAS Bulletins</h2>
        <ul id="bulletinsMount" class="bulletin-feed-list"></ul>
      </section>

      <section class="bulletin-archive" aria-labelledby="bulletin-archive-heading">
        <h2 id="bulletin-archive-heading" class="bulletin-archive-title">
          Browse Bulletins by Year
        </h2>
        <nav id="bulletin-archive-links" aria-label="Bulletin archive years"></nav>
      </section>
    </div>
  </main>

  <!-- =======================================
       SCRIPTS
       site-root.js MUST load first
  ======================================== -->
  <script src="../js/site-root.js"></script>
  <script defer src="../js/navbar.js"></script>
  <script src="../js/bulletin-year-loader.js"></script>
  <script src="../js/bulletin-config.js"></script>
  <script src="../js/bullarchive.js"></script>
</body>
</html>
